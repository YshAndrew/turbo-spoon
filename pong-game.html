<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            font-family: 'Arial', sans-serif;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        h1 {
            color: #fff;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .game-board {
            position: relative;
            width: 800px;
            height: 400px;
            background: #000;
            border: 3px solid #fff;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
            overflow: hidden;
        }

        .center-line {
            position: absolute;
            left: 50%;
            top: 0;
            width: 2px;
            height: 100%;
            background: repeating-linear-gradient(
                to bottom,
                #fff 0px,
                #fff 10px,
                transparent 10px,
                transparent 20px
            );
            transform: translateX(-50%);
            z-index: 1;
        }

        .paddle {
            position: absolute;
            width: 10px;
            height: 80px;
            background: #fff;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .player-paddle {
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
        }

        .computer-paddle {
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
        }

        .ball {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
        }

        .scoreboard {
            display: flex;
            justify-content: space-around;
            width: 100%;
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            padding: 0 40px;
        }

        .score-section {
            flex: 1;
        }

        .score-label {
            font-size: 14px;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .score-value {
            font-size: 48px;
            color: #4fc3f7;
        }

        .info {
            color: #fff;
            text-align: center;
            font-size: 14px;
        }

        .info p {
            margin: 5px 0;
        }

        .reset-button {
            padding: 10px 30px;
            font-size: 16px;
            background: #4fc3f7;
            color: #000;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .reset-button:hover {
            background: #81d4fa;
            transform: scale(1.05);
        }

        .reset-button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 PONG GAME</h1>
        
        <div class="scoreboard">
            <div class="score-section">
                <div class="score-label">Player</div>
                <div class="score-value" id="playerScore">0</div>
            </div>
            <div class="score-section">
                <div class="score-label">Computer</div>
                <div class="score-value" id="computerScore">0</div>
            </div>
        </div>

        <div class="game-board">
            <div class="center-line"></div>
            <div class="paddle player-paddle" id="playerPaddle"></div>
            <div class="paddle computer-paddle" id="computerPaddle"></div>
            <div class="ball" id="ball"></div>
        </div>

        <div class="info">
            <p><strong>Controls:</strong> Mouse Y or Arrow Keys (↑/↓) to move left paddle</p>
            <p id="gameStatus">Press Space or click to start game</p>
            <button class="reset-button" onclick="resetGame()">Reset Game</button>
        </div>
    </div>

    <script>
        // Game constants
        const GAME_WIDTH = 800;
        const GAME_HEIGHT = 400;
        const PADDLE_WIDTH = 10;
        const PADDLE_HEIGHT = 80;
        const BALL_SIZE = 10;
        const PADDLE_SPEED = 6;
        const INITIAL_BALL_SPEED = 4;
        const MAX_BALL_SPEED = 7;

        // Game objects
        const game = {
            playerScore: 0,
            computerScore: 0,
            gameRunning: false,
            paused: false
        };

        const player = {
            x: 20,
            y: (GAME_HEIGHT - PADDLE_HEIGHT) / 2,
            width: PADDLE_WIDTH,
            height: PADDLE_HEIGHT,
            dy: 0
        };

        const computer = {
            x: GAME_WIDTH - 20 - PADDLE_WIDTH,
            y: (GAME_HEIGHT - PADDLE_HEIGHT) / 2,
            width: PADDLE_WIDTH,
            height: PADDLE_HEIGHT,
            dy: 0,
            speed: 3.5
        };

        const ball = {
            x: GAME_WIDTH / 2,
            y: GAME_HEIGHT / 2,
            radius: BALL_SIZE / 2,
            dx: INITIAL_BALL_SPEED,
            dy: INITIAL_BALL_SPEED,
            speed: INITIAL_BALL_SPEED
        };

        // Input tracking
        const keys = {
            ArrowUp: false,
            ArrowDown: false
        };

        let mouseY = GAME_HEIGHT / 2;

        // Event listeners
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp') keys.ArrowUp = true;
            if (e.key === 'ArrowDown') keys.ArrowDown = true;
            if (e.key === ' ') {
                e.preventDefault();
                toggleGame();
            }
        });

        document.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowUp') keys.ArrowUp = false;
            if (e.key === 'ArrowDown') keys.ArrowDown = false;
        });

        document.addEventListener('mousemove', (e) => {
            const gameBoard = document.querySelector('.game-board');
            const rect = gameBoard.getBoundingClientRect();
            mouseY = e.clientY - rect.top - PADDLE_HEIGHT / 2;
            mouseY = Math.max(0, Math.min(mouseY, GAME_HEIGHT - PADDLE_HEIGHT));
        });

        document.addEventListener('click', () => {
            if (!game.gameRunning) toggleGame();
        });

        // Game functions
        function toggleGame() {
            game.gameRunning = !game.gameRunning;
            updateStatus();
        }

        function resetGame() {
            game.playerScore = 0;
            game.computerScore = 0;
            game.gameRunning = false;
            resetBall();
            updateScore();
            updateStatus();
        }

        function resetBall() {
            ball.x = GAME_WIDTH / 2;
            ball.y = GAME_HEIGHT / 2;
            ball.speed = INITIAL_BALL_SPEED;
            const angle = (Math.random() - 0.5) * (Math.PI / 4);
            const direction = Math.random() > 0.5 ? 1 : -1;
            ball.dx = Math.cos(angle) * ball.speed * direction;
            ball.dy = Math.sin(angle) * ball.speed;
        }

        function updateStatus() {
            const statusEl = document.getElementById('gameStatus');
            if (game.gameRunning) {
                statusEl.textContent = '🎮 Game Running - Press Space to Pause';
            } else {
                statusEl.textContent = '⏸️ Game Paused - Press Space or Click to Start';
            }
        }

        function updateScore() {
            document.getElementById('playerScore').textContent = game.playerScore;
            document.getElementById('computerScore').textContent = game.computerScore;
        }

        function updatePlayerPaddle() {
            // Use mouse position or arrow keys
            if (keys.ArrowUp || keys.ArrowDown) {
                if (keys.ArrowUp) player.y = Math.max(0, player.y - PADDLE_SPEED);
                if (keys.ArrowDown) player.y = Math.min(GAME_HEIGHT - PADDLE_HEIGHT, player.y + PADDLE_SPEED);
            } else {
                player.y = mouseY;
            }
            
            // Clamp to game bounds
            player.y = Math.max(0, Math.min(player.y, GAME_HEIGHT - PADDLE_HEIGHT));
        }

        function updateComputerPaddle() {
            const computerCenter = computer.y + PADDLE_HEIGHT / 2;
            const ballCenter = ball.y;

            // AI logic with some "imperfection" for playability
            if (ballCenter < computerCenter - 35) {
                computer.y = Math.max(0, computer.y - computer.speed);
            } else if (ballCenter > computerCenter + 35) {
                computer.y = Math.min(GAME_HEIGHT - PADDLE_HEIGHT, computer.y + computer.speed);
            }
        }

        function updateBall() {
            ball.x += ball.dx;
            ball.y += ball.dy;

            // Top and bottom wall collision
            if (ball.y - ball.radius <= 0 || ball.y + ball.radius >= GAME_HEIGHT) {
                ball.dy *= -1;
                ball.y = Math.max(ball.radius, Math.min(GAME_HEIGHT - ball.radius, ball.y));
            }

            // Paddle collision detection
            if (checkPaddleCollision(player)) {
                ball.dx = Math.abs(ball.dx) * 1.02; // Increase speed slightly
                ball.speed = Math.min(ball.dx, MAX_BALL_SPEED);
                ball.x = player.x + player.width + ball.radius;
                
                // Add spin based on where ball hits paddle
                const hitPos = (ball.y - (player.y + PADDLE_HEIGHT / 2)) / (PADDLE_HEIGHT / 2);
                ball.dy = hitPos * ball.speed * 0.8;
            }

            if (checkPaddleCollision(computer)) {
                ball.dx = Math.abs(ball.dx) * -1.02;
                ball.speed = Math.min(Math.abs(ball.dx), MAX_BALL_SPEED);
                ball.x = computer.x - ball.radius;
                
                const hitPos = (ball.y - (computer.y + PADDLE_HEIGHT / 2)) / (PADDLE_HEIGHT / 2);
                ball.dy = hitPos * ball.speed * 0.8;
            }

            // Scoring
            if (ball.x - ball.radius < 0) {
                game.computerScore++;
                updateScore();
                resetBall();
            } else if (ball.x + ball.radius > GAME_WIDTH) {
                game.playerScore++;
                updateScore();
                resetBall();
            }
        }

        function checkPaddleCollision(paddle) {
            return (
                ball.x - ball.radius < paddle.x + paddle.width &&
                ball.x + ball.radius > paddle.x &&
                ball.y - ball.radius < paddle.y + paddle.height &&
                ball.y + ball.radius > paddle.y
            );
        }

        function render() {
            const playerEl = document.getElementById('playerPaddle');
            const computerEl = document.getElementById('computerPaddle');
            const ballEl = document.getElementById('ball');

            playerEl.style.top = player.y + 'px';
            computerEl.style.top = computer.y + 'px';
            ballEl.style.left = (ball.x - ball.radius) + 'px';
            ballEl.style.top = (ball.y - ball.radius) + 'px';
        }

        function gameLoop() {
            if (game.gameRunning) {
                updatePlayerPaddle();
                updateComputerPaddle();
                updateBall();
            }
            render();
            requestAnimationFrame(gameLoop);
        }

        // Start the game loop
        updateStatus();
        gameLoop();
    </script>
</body>
</html>
